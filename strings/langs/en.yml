start_1 : "{0} ᴀᴋᴛɪᴠᴅɪʀ ʙᴀʙʏ.\n\n<b>✫ ᴀᴋᴛɪᴠʟɪᴋ ᴍüᴅᴅəᴛɪ :</b> {1}"
start_2 : "<b>● sᴀʟᴀᴍ ʙᴀʙʏ xöş ɢəʟᴅɪɴ... 🌸⛈️</b>\n\n<b>❍ ᴍəɴ {1} </b>\n<b>•──────────────────────•</b>\n<b>❖ ᴅᴏɴᴍᴀ ʏᴏx | ʀᴇᴋʟᴀᴍsıᴢ ᴍᴜsɪqɪ | ᴘʀᴏᴍᴏ ʏᴏx</b>\n<b>❖ qʀᴜᴘᴜɴᴜᴢᴀ ɴɪᴢᴀᴍ-ɪɴᴛɪᴢᴀᴍ ɢəᴛɪʀəᴋ</b>\n<b>❖ sᴇᴠɢɪɴɪᴢɪ üᴢə çıxᴀʀᴍᴀq üçüɴ | /help | ʏᴀᴢıɴ</b>\n<b>❖ qʀᴜᴘ ᴍᴜsɪqɪɴɪᴢɪ ʀᴀʜᴀᴛᴄᴀ ɪᴅᴀʀə ᴇᴅɪɴ</b>\n<b>•──────────────────────</b>"
start_3 : "❍ sᴀʟᴀᴍ {0},\nʙᴜ {1}\n\nᴍəɴɪ {2} qʀᴜᴘᴜɴᴀ əʟᴀᴠə ᴇᴛᴅɪʏɪɴɪᴢ üçüɴ təşəᴋᴋüʀʟəʀ, {3} ɪɴᴅɪ ʙᴜ çᴀᴛᴅᴀ ᴍᴀʜɴı ᴘʟəʏ ᴇᴅə ʙɪʟəʀ."
start_4 : "🎄 <b>sᴜᴘᴇʀqʀᴜᴘ ᴛəʟəʙ ᴏʟᴜɴᴜʀ</b> 🎄\n\nxᴀʜɪş ᴇᴅɪʀɪᴋ qʀᴜᴘᴜɴᴜᴢᴜ <b>sᴜᴘᴇʀqʀᴜᴘ</b>-ᴀ çᴇᴠɪʀɪɴ ᴠə sᴏɴʀᴀ ᴍəɴɪ ʏᴇɴɪᴅəɴ əʟᴀᴠə ᴇᴅɪɴ.\n\n<b>sᴜᴘᴇʀqʀᴜᴘ ɴᴇᴄə ᴇᴅɪʟɪʀ ?</b>\n- qʀᴜᴘᴜɴ çᴀᴛ ᴛᴀʀɪxçəsɪɴɪ <b>ɢörüɴəɴ</b> sᴇçıɴ."
start_5 : "<b>↝ qᴀʀᴀ sɪʏᴀʜıᴅᴀᴋı çᴀᴛ ↜</b>\n\nʙᴜ çᴀᴛ {0} ᴍəʟᴜᴍᴀᴛ ʙᴀᴢᴀsıɴᴅᴀ qᴀʀᴀ sɪʏᴀʜıᴅᴀᴅıʀ.\nçᴀᴛı qᴀʀᴀ sɪʏᴀʜıᴅᴀɴ çıxᴀʀᴍᴀq üçüɴ <a href={1}>sᴜᴅᴏ ɪsᴛɪғᴀᴅəçɪsɪɴə</a> ᴍürᴀᴄɪəᴛ ᴇᴅɪɴ ᴠə ʏᴀ <a href={2}>ᴅəsᴛəᴋ çᴀᴛıɴı</a> ᴢɪʏᴀʀəᴛ ᴇᴅɪɴ."
start_6 : "😲 <b>ᴍᴀʜɴı ᴍəʟᴜᴍᴀᴛı</b> 😲\n\n📌 <b>ᴀᴅı :</b> {0}\n\n⏳ <b>ᴍüᴅᴅəᴛ :</b> {1} dəqɪqə\n👀 <b>ʙᴀxış sᴀʏı :</b> <code>{2}</code>\n⏰ <b>ʏᴀʏıᴍʟᴀɴᴍᴀ ᴛᴀʀɪxɪ :</b> {3}\n📎 <b>ᴋᴀɴᴀʟ :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 ᴀxᴛᴀʀış ᴅəsᴛəʏɪ: {6}</b></u>"

